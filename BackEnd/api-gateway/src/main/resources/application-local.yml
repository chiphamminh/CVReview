spring:
  config:
    import: optional:classpath:.env[.properties]

  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 30000
            response-timeout: 300s
            pool:
              type: fixed
              max-connections: 500
              pending-acquire-max-count: 1000
              pending-acquire-timeout: 10000

          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**,/admin/hr-accounts,/admin/stats/**
                - Method=GET,POST,PUT,DELETE
              filters:
                - name: CircuitBreaker
                  args:
                    name: authServiceCircuitBreaker
                    statusCodes: 500,502,503

            - id: recruitment-service
              uri: http://localhost:8082
              predicates:
                - Path=/positions/**,/cv/**,/upload/**,/analysis/**,/tracking/**,/chunking/**,/hr/analytics/**,/hr/cvs/**,/internal/chatbot/**,/api/chatbot/**
                - Method=GET,POST,PUT,PATCH,DELETE
              filters:
                - name: CircuitBreaker
                  args:
                    name: defaultCircuitBreaker
                    statusCodes: 500,502,503

            - id: chatbot-service
              uri: http://localhost:8085
              predicates:
                - Path=/chatbot/**
                - Method=GET,POST,PUT,DELETE
              filters:
                - name: CircuitBreaker
                  args:
                    name: defaultCircuitBreaker
                    statusCodes: 500,502,503

            - id: embedding-service
              uri: http://localhost:8084
              predicates:
                - Path=/jd/embed/**,/jd/re-embed/**,/cv/embed/**,/cv/re-embed/**
                - Method=GET,POST,PUT,DELETE
              filters:
                - name: CircuitBreaker
                  args:
                    name: defaultCircuitBreaker
                    statusCodes: 500,502,503

  # WebFlux configuration for request body size
  http:
    codecs:
      max-in-memory-size: 52428800  # 50MB in bytes

resilience4j:
  timelimiter:
    instances:
      authServiceCircuitBreaker:
        timeout-duration: 10s        
        cancel-running-future: true
      defaultCircuitBreaker:
        timeout-duration: 120s        
        cancel-running-future: true
  circuitbreaker:
    instances:
      authServiceCircuitBreaker:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 3 
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
      defaultCircuitBreaker:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 3 
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80

