spring:
  config:
    import: optional:classpath:.env[.properties]

  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 30000
            response-timeout: 300s

          routes:
            - id: auth-service
              uri: http://auth-service:8081  # Use service name in Docker
              predicates:
                - Path=/auth/**
                - Method=GET,POST,PUT,DELETE
              filters:
                - name: CircuitBreaker
                  args:
                    name: authServiceCircuitBreaker
                    statusCodes: 500,502,503

            - id: recruitment-service
              uri: http://recruitment-service:8082  # Use service name in Docker
              predicates:
                - Path=/positions/**,/cv/**,/upload/**,/analysis/**,/tracking/**,/chunking/**
                - Method=GET,POST,PUT,PATCH,DELETE
              filters:
                - name: CircuitBreaker
                  args:
                    name: defaultCircuitBreaker
                    statusCodes: 500,502,503

            - id: embedding-service
              uri: http://embedding-api:8084  # Use service name in Docker
              predicates:
                - Path=/jd/**,/cv/**
                - Method=GET,POST,PUT,DELETE
              filters:
                - name: CircuitBreaker
                  args:
                    name: defaultCircuitBreaker
                    statusCodes: 500,502,503
            # Chatbot Service
            - id: chatbot-service
              uri: http://chatbot-service:8085
              predicates:
                - Path=/chatbot/**
              filters:
                - RewritePath=/chatbot/(?<segment>.*), /api/v1/$\{segment}
                - name: CircuitBreaker
                  args:
                    name: defaultCircuitBreaker
                    statusCodes: 500,502,503

  # WebFlux configuration for request body size
  http:
    codecs:
      max-in-memory-size: 52428800  # 50MB in bytes

