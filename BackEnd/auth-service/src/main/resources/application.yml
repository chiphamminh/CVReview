spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  address: 0.0.0.0
  port: 8081
  tomcat:
    connection-timeout: 90000
    max-http-form-post-size: 52428800  # 50MB
    threads:
      max: 200
      min-spare: 10
  max-http-request-header-size: 65536

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET}
#  expiration: 900000          # 15 phút
#  refresh-expiration: 1800000 # 30 phút
  expiration: 1800000 # 30 phút
  refresh-expiration: 604800000 # 7 ngày

otp:
  expiration-minutes: 5
  max-attempts: 5
  reset-token-expiration-minutes: 10
